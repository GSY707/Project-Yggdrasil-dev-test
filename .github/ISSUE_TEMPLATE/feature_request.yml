name: Feature request
description: Suggest an idea for this project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or developer pain point does this solve?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the solution you want.
      placeholder: A clear and concise description of your proposal.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you consider?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, references, or examples.
